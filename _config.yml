title: vietd0x@kma:~/blog$
description: "A Jekyll Blog Theme For Hackers"
author:
  name: "Viet Do"
  email: "viet.doxv@gmail.com"
  url: "https://vietd0x.github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 10
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "vietd0x"
year : "2021"
